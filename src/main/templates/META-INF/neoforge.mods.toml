# This is an example mods.toml file. It contains the data relating to the loading mods.
# There are several mandatory fields (#mandatory), and many more that are optional (#optional).
# The overall format is standard TOML format, v0.5.0.
# Note that there are a couple of TOML lists in this file.
# Find more information on toml format here:  https://github.com/toml-lang/toml
# The name of the mod loader type to load - for regular FML @Mod mods it should be javafml
modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"

authors = "${mod_authors}"
description = '''${mod_description}'''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies."${mod_id}"]]
modId = "ae2"
type = "REQUIRED"
ordering="AFTER"
side="BOTH"
versionRange = "[19.2.16,)"

[[dependencies."${mod_id}"]]
modId = "myotus"
type = "REQUIRED"
ordering="AFTER"
side="BOTH"
versionRange = "[19.0.9]"

[[dependencies."${mod_id}"]]
modId = "ae2wtlib"
type = "OPTIONAL"
ordering = "BEFORE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "polymorph"
type = "OPTIONAL"
ordering="AFTER"
side="BOTH"

[[dependencies."${mod_id}"]]
modId = "polyeng"
type = "OPTIONAL"
ordering="AFTER"
side="BOTH"

[[dependencies."${mod_id}"]]
modId = "extendedcrafting"
type = "OPTIONAL"
ordering="AFTER"
side="BOTH"
versionRange = "[7,)"

[[dependencies."${mod_id}"]]
modId = "avaritia"
type = "OPTIONAL"
ordering="AFTER"
side="BOTH"
